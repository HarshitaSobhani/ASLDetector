name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: signspot/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: signspot

      - name: Syntax check all Python files
        run: python -m py_compile $(find . -name "*.py" -not -path "./.venv/*")
        working-directory: signspot

      - name: Run data pipeline tests
        run: python tests/test_data_pipeline.py
        working-directory: signspot
